<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FuzzyTabEnhanced</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div class="fsl-page" role="application" aria-label="FuzzyTabEnhanced">
    <div class="fsl-input-container">
      <span class="fsl-prompt">&gt;</span>
      <input id="fuzzy-tabs-input" type="text" autocomplete="off" placeholder="Start typing something..." autofocus/>
      <div id="fsl-counter" class="fsl-counter">0/0</div>
      <div id="fsl-mode-icon" class="fsl-mode-icon"></div>
    </div>
    <ul class="fsl-results" aria-label="Open tabs"></ul>
    <div class="fsl-footer">
      <span><b>Tab</b> Mode</span>
      <span><b>Ctrl+J/K</b> Navigate</span>
      <span><b>Enter</b> Select</span>
      <span><b>Ctrl+W</b> Close Tab</span>
      <span><b>Esc / Ctrl+C</b> Exit</span>
    </div>
  </div>
  <script src="microfuzz.bundle.js"></script>
  <script src="app.js"></script>
</body>
</html>
